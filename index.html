<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #1a1a2e;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #e0e0e0;
      user-select: none;
    }

    canvas { display: block; }

    /* ── HUD Overlay ── */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px 24px;
      pointer-events: none;
      z-index: 10;
    }

    #hud-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    #turn-label {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    #status-msg {
      font-size: 15px;
      min-height: 20px;
      opacity: 0.85;
      transition: opacity 0.2s;
    }

    /* ── Bottom bar ── */
    #bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      z-index: 10;
    }

    .btn {
      pointer-events: all;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #e0e0e0;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      backdrop-filter: blur(6px);
    }
    .btn:hover { background: rgba(255, 255, 255, 0.15); border-color: rgba(255,255,255,0.3); }
    .btn.active { background: rgba(100, 200, 255, 0.2); border-color: rgba(100, 200, 255, 0.5); }

    /* ── Score panel ── */
    #score-panel {
      position: fixed;
      top: 80px; left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 32px;
      z-index: 10;
      pointer-events: none;
    }

    .score-box {
      text-align: center;
      min-width: 80px;
    }
    .score-box .label {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.6;
      margin-bottom: 2px;
    }
    .score-box .value {
      font-size: 28px;
      font-weight: 700;
    }

    .color-x { color: #ff6b9d; }
    .color-o { color: #4ecdc4; }
    .color-draw { color: #f7dc6f; }
  </style>
</head>
<body>
  <!-- HUD -->
  <div id="hud">
    <div id="hud-inner">
      <div id="turn-label">Turn: X</div>
      <div id="status-msg"></div>
    </div>
  </div>

  <!-- Scores -->
  <div id="score-panel">
    <div class="score-box">
      <div class="label color-x">X Wins</div>
      <div class="value color-x" id="score-x">0</div>
    </div>
    <div class="score-box">
      <div class="label color-draw">Draws</div>
      <div class="value color-draw" id="score-draw">0</div>
    </div>
    <div class="score-box">
      <div class="label color-o">O Wins</div>
      <div class="value color-o" id="score-o">0</div>
    </div>
  </div>

  <!-- Bottom controls -->
  <div id="bottom-bar">
    <button class="btn active" id="btn-pvp">Human vs Human (1)</button>
    <button class="btn" id="btn-cpu-easy">vs CPU Easy (2)</button>
    <button class="btn" id="btn-cpu-med">vs CPU Medium (3)</button>
    <button class="btn" id="btn-cpu-hard">vs CPU Hard (4)</button>
    <button class="btn" id="btn-restart">Restart (R)</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
