<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe 3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      font-family: 'Fredoka', 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      user-select: none;
    }

    canvas { display: block; }

    /* ── Title ── */
    #title-bar {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none;
      text-align: center;
    }

    #title-bar h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    #title-bar h1 .t1 { color: #ff6b9d; }
    #title-bar h1 .t2 { color: #ffd93d; }
    #title-bar h1 .t3 { color: #6bcbff; }

    /* ── Player cards ── */
    .player-card {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 18px 16px;
      border-radius: 20px;
      backdrop-filter: blur(12px);
      min-width: 110px;
      transition: box-shadow 0.3s, border-color 0.3s;
    }

    #player-x-card {
      left: 20px;
      background: rgba(255, 107, 157, 0.1);
      border: 2px solid rgba(255, 107, 157, 0.25);
    }
    #player-x-card.active-turn {
      border-color: rgba(255, 107, 157, 0.7);
      box-shadow: 0 0 24px rgba(255, 107, 157, 0.3);
    }

    #player-o-card {
      right: 20px;
      background: rgba(107, 203, 255, 0.1);
      border: 2px solid rgba(107, 203, 255, 0.25);
    }
    #player-o-card.active-turn {
      border-color: rgba(107, 203, 255, 0.7);
      box-shadow: 0 0 24px rgba(107, 203, 255, 0.3);
    }

    .player-card .icon {
      font-size: 38px;
      line-height: 1;
      font-weight: 700;
    }

    .player-card .name {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.8;
    }

    .player-card .score {
      font-size: 36px;
      font-weight: 700;
      line-height: 1;
    }

    .player-card .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.5;
    }

    .color-x { color: #ff6b9d; }
    .color-o { color: #6bcbff; }

    /* ── Center HUD ── */
    #hud-center {
      position: fixed;
      top: 68px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    #round-label {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.6;
    }

    #turn-label {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      transition: color 0.2s;
    }

    #status-msg {
      font-size: 14px;
      min-height: 20px;
      opacity: 0.85;
      transition: opacity 0.2s;
      text-align: center;
    }

    /* ── Draw score (center top between player cards) ── */
    #draw-badge {
      position: fixed;
      top: 130px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 8px 18px;
      border-radius: 12px;
      background: rgba(255, 217, 61, 0.08);
      border: 1px solid rgba(255, 217, 61, 0.2);
    }

    #draw-badge .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #ffd93d;
      opacity: 0.6;
    }

    #draw-badge .value {
      font-size: 20px;
      font-weight: 700;
      color: #ffd93d;
    }

    /* ── Bottom bar ── */
    #bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 16px 24px;
      z-index: 10;
      background: linear-gradient(to top, rgba(15, 10, 40, 0.5), transparent);
    }

    .btn {
      pointer-events: all;
      background: rgba(255, 255, 255, 0.06);
      border: 1.5px solid rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.75);
      padding: 9px 18px;
      border-radius: 12px;
      font-family: 'Fredoka', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(8px);
    }
    .btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.25);
      color: #fff;
      transform: translateY(-1px);
    }
    .btn.active {
      background: rgba(160, 120, 255, 0.2);
      border-color: rgba(160, 120, 255, 0.6);
      color: #fff;
      box-shadow: 0 0 14px rgba(160, 120, 255, 0.2);
    }
    .btn-restart {
      background: rgba(255, 217, 61, 0.1) !important;
      border-color: rgba(255, 217, 61, 0.3) !important;
      color: #ffd93d !important;
    }
    .btn-restart:hover {
      background: rgba(255, 217, 61, 0.2) !important;
      border-color: rgba(255, 217, 61, 0.5) !important;
      box-shadow: 0 0 14px rgba(255, 217, 61, 0.15);
    }

    /* ── Decorative floating dots ── */
    .deco-dot {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      opacity: 0.08;
    }

    /* ── Win overlay ── */
    #win-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      z-index: 20;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s, transform 0.4s;
      text-align: center;
    }

    #win-overlay.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    #win-overlay .big-text {
      font-size: 56px;
      font-weight: 700;
      text-shadow: 0 4px 24px rgba(0,0,0,0.4);
      line-height: 1.1;
    }

    #win-overlay .sub-text {
      font-size: 16px;
      opacity: 0.7;
      margin-top: 8px;
    }

    /* ── Move indicators ── */
    #move-dots {
      position: fixed;
      bottom: 64px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 6px;
      pointer-events: none;
    }

    .move-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      transition: background 0.3s, transform 0.3s;
    }
    .move-dot.x { background: #ff6b9d; transform: scale(1.1); }
    .move-dot.o { background: #6bcbff; transform: scale(1.1); }

    /* ── Responsive adjustments ── */
    @media (max-width: 800px) {
      .player-card {
        top: auto;
        bottom: 90px;
        transform: none;
        padding: 12px;
        min-width: 90px;
      }
      #player-x-card { left: 10px; }
      #player-o-card { right: 10px; }
      .player-card .icon { font-size: 28px; }
      .player-card .score { font-size: 28px; }
      #title-bar h1 { font-size: 24px; }
      #win-overlay .big-text { font-size: 40px; }
    }
  </style>
</head>
<body>
  <!-- Decorative background dots -->
  <div class="deco-dot" style="width:300px;height:300px;background:#ff6b9d;top:-80px;left:-80px;"></div>
  <div class="deco-dot" style="width:250px;height:250px;background:#6bcbff;bottom:-60px;right:-60px;"></div>
  <div class="deco-dot" style="width:180px;height:180px;background:#ffd93d;top:30%;right:-40px;"></div>
  <div class="deco-dot" style="width:200px;height:200px;background:#a078ff;bottom:20%;left:-50px;"></div>

  <!-- Title -->
  <div id="title-bar">
    <h1><span class="t1">Tic</span> <span class="t2">Tac</span> <span class="t3">Toe</span></h1>
  </div>

  <!-- Center HUD -->
  <div id="hud-center">
    <div id="round-label">Round 1</div>
    <div id="turn-label">Turn: X</div>
    <div id="status-msg"></div>
  </div>

  <!-- Draw badge -->
  <div id="draw-badge">
    <div class="label">Draws</div>
    <div class="value" id="score-draw">0</div>
  </div>

  <!-- Player cards -->
  <div class="player-card active-turn" id="player-x-card">
    <div class="icon color-x">X</div>
    <div class="name">Player 1</div>
    <div class="score color-x" id="score-x">0</div>
    <div class="label">wins</div>
  </div>

  <div class="player-card" id="player-o-card">
    <div class="icon color-o">O</div>
    <div class="name" id="player-o-name">Player 2</div>
    <div class="score color-o" id="score-o">0</div>
    <div class="label">wins</div>
  </div>

  <!-- Move dots (progress bar showing X/O moves placed) -->
  <div id="move-dots">
    <div class="move-dot"></div>
    <div class="move-dot"></div>
    <div class="move-dot"></div>
    <div class="move-dot"></div>
    <div class="move-dot"></div>
    <div class="move-dot"></div>
    <div class="move-dot"></div>
    <div class="move-dot"></div>
    <div class="move-dot"></div>
  </div>

  <!-- Win overlay -->
  <div id="win-overlay">
    <div class="big-text" id="win-text"></div>
    <div class="sub-text">Press R or click Restart</div>
  </div>

  <!-- Bottom controls -->
  <div id="bottom-bar">
    <button class="btn active" id="btn-pvp">2 Players (1)</button>
    <button class="btn" id="btn-cpu-easy">Easy CPU (2)</button>
    <button class="btn" id="btn-cpu-med">Medium CPU (3)</button>
    <button class="btn" id="btn-cpu-hard">Hard CPU (4)</button>
    <button class="btn btn-restart" id="btn-restart">Restart (R)</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
